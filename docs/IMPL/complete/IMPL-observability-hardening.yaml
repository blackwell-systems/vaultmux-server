            Configure Gin to run in release mode for production deployments (Issue #10).

            ## What to implement

            1. Update cmd/server/main.go to set gin.ReleaseMode based on GIN_MODE environment variable
            2. Replace gin.Default() with gin.New() for explicit middleware control
            3. Update Dockerfile to set GIN_MODE=release environment variable
            4. Initialize structured logger (logger.Init) and defer logger.Sync()

            ## Interface contracts

            None - this agent is independent of Wave 1 Agent A, but coordinates on cmd/server/main.go structure.

            main.go changes:
            - Read GIN_MODE environment variable (default: "release" if not set)
            - Call gin.SetMode(gin.ReleaseMode) if GIN_MODE is "release" or empty
            - Replace `r := gin.Default()` with `r := gin.New()`
            - Keep existing middleware registrations (Logger, Recovery, SecurityHeaders, RateLimitMiddleware)
            - Call logger.Init() after gin mode setup, before creating router
            - Defer logger.Sync() after logger.Init()

            Dockerfile changes:
            - Add ENV GIN_MODE=release after COPY --from=builder line

            ## Tests required

            No new test files (cmd/server/main.go is integration code).

            Manual verification:
            - Build Docker image and verify GIN_MODE=release is set
            - Start server and verify no debug output (release mode active)
            - Verify structured logs appear in JSON format

            ## Verification gate

            ```bash
            go build ./cmd/server
            docker build -t vaultmux-server:test .
            docker run --rm -e VAULTMUX_BACKEND=awssecrets vaultmux-server:test --help
            ```

            ## Constraints and warnings

            - gin.SetMode() must be called BEFORE gin.New() (Gin requirement)
            - Default to release mode if GIN_MODE is empty (production-safe default)
            - Preserve all existing middleware registrations in same order
            - Logger initialization (logger.Init) depends on Agent A's logger package, but Agent B runs in parallel because logger.Init is a runtime call, not a compile-time dependency
            - If logger.Init fails, log.Fatalf and exit (fatal error, cannot continue)
          files:
