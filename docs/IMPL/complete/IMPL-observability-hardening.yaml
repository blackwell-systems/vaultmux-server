        - id: C
          task: |
            Implement error message sanitization to prevent information disclosure (Issue #8).

            ## What to implement

            1. Create handlers/errors.go with sanitizeError function
            2. Update handlers/secrets.go to use sanitizeError for all backend errors
            3. Create handlers/errors_test.go to test error sanitization

            ## Interface contracts

            sanitizeError function:
            - Signature: `func sanitizeError(err error, context string) string`
            - Logs full error details using logger.Log.Error() with context
            - Returns generic "internal server error" message for all errors
            - Context parameter describes where error occurred (e.g., "list secrets", "get secret")

            handlers/secrets.go changes:
            - Replace all `gin.H{"error": err.Error()}` with `gin.H{"error": sanitizeError(err, "<context>")}`
            - Apply to lines: 43, 68, 92, 101, 124, 132, 148, 157 (all backend error returns)
            - Do NOT sanitize validation errors (400 Bad Request) - those are client errors, not backend leaks
            - Do NOT sanitize "secret not found" (404) or "secret already exists" (409) - these are expected user-facing messages

            ## Tests required

            handlers/errors_test.go:
            - TestSanitizeError_LogsFullError: verify full error is logged via logger.Log
            - TestSanitizeError_ReturnsGenericMessage: verify return value is generic
            - TestSanitizeError_WithContext: verify context is included in log
            - Use zaptest.NewLogger to capture log output for assertions

            handlers/secrets_test.go updates (if exists):
            - Update existing error assertions to expect sanitized messages
            - Verify 500 errors return "internal server error" instead of raw backend errors

            ## Verification gate

            ```bash
            go build ./...
            go vet ./...
            go test -v -race ./handlers
            ```

            ## Constraints and warnings

            - Depends on Agent A's logger package (logger.Log must be initialized)
            - Only sanitize 500 Internal Server Error responses (backend errors)
            - Do NOT sanitize 400/404/409 errors (those are intentional user-facing messages)
            - Log full error with context for internal debugging/monitoring
            - Use logger.Log.Error() with zap.Error(err) and zap.String("context", context)
            - Generic message must be exactly "internal server error" (lowercase, no punctuation) for consistency
          files:
