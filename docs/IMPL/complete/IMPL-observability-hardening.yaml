interface_contracts:
    - name: Logger Package
      description: Global structured logger instance and initialization
      definition: |
        package logger

        import "go.uber.org/zap"

        var Log *zap.Logger

        // Init initializes the global structured logger.
        // Call once at application startup.
        // mode: "production" or "development"
        func Init(mode string) error {
            var err error
            if mode == "production" {
                Log, err = zap.NewProduction()
            } else {
                Log, err = zap.NewDevelopment()
            }
            return err
        }

        // Sync flushes any buffered log entries.
        // Call before application shutdown.
        func Sync() error {
            if Log != nil {
                return Log.Sync()
            }
            return nil
        }
      location: pkg/logger/logger.go
    - name: sanitizeError
      description: Sanitizes backend errors for client responses while logging full details
      definition: |
        package handlers

        // sanitizeError logs the full error details and returns a generic error message for the client.
        // This prevents information disclosure while maintaining internal observability.
        // Returns a generic "internal server error" message for all backend errors.
        func sanitizeError(err error, context string) string
      location: handlers/errors.go
    - name: Updated Logger Middleware
      description: Structured logging middleware using zap
      definition: |
        package middleware

        import (
            "time"
            "github.com/gin-gonic/gin"
            "go.uber.org/zap"
            "github.com/blackwell-systems/vaultmux-server/pkg/logger"
        )

        // Logger returns a Gin middleware that logs HTTP requests using structured logging.
        // Logs: method, status, path, client IP, latency, and any errors.
        func Logger() gin.HandlerFunc {
            return func(c *gin.Context) {
                start := time.Now()
                path := c.Request.URL.Path
                if raw := c.Request.URL.RawQuery; raw != "" {
                    path = path + "?" + raw
                }

                c.Next()

                latency := time.Since(start)

                logger.Log.Info("request",
                    zap.String("method", c.Request.Method),
                    zap.Int("status", c.Writer.Status()),
                    zap.String("path", path),
                    zap.String("client_ip", c.ClientIP()),
                    zap.Duration("latency", latency),
                )
            }
        }
      location: middleware/middleware.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            Implement structured logging using go.uber.org/zap to replace unstructured log.Printf calls (Issue #9).

            ## What to implement

            1. Create pkg/logger/logger.go with global logger initialization
            2. Add go.uber.org/zap dependency to go.mod
            3. Update middleware/middleware.go Logger() to use structured logging
            4. Update middleware/middleware_test.go to test structured logger middleware

            ## Interface contracts

            Logger package exports:
            - `var Log *zap.Logger` - global logger instance
            - `func Init(mode string) error` - initializes logger ("production" or "development" mode)
            - `func Sync() error` - flushes buffered logs

            Logger() middleware:
            - Logs request metadata: method, status, path, client_ip, latency
            - Uses logger.Log.Info() with zap structured fields
            - No changes to function signature (remains gin.HandlerFunc)

            ## Tests required

            pkg/logger/logger_test.go:
            - TestInit_ProductionMode: verify production logger initialization
            - TestInit_DevelopmentMode: verify development logger initialization
            - TestSync: verify Sync() does not panic when logger is nil or initialized

            middleware/middleware_test.go updates:
            - Update TestLogger to verify structured log output format
            - Test that logger.Log.Info is called with correct zap fields
            - Use zaptest.NewLogger for test logger instance

            ## Verification gate

            ```bash
            go build ./...
            go vet ./...
            go test -v -race ./pkg/logger ./middleware
            ```

            ## Constraints and warnings

            - Do NOT modify cmd/server/main.go (Agent B owns it, will initialize logger)
            - Do NOT modify handlers/* (Agent C will integrate sanitizeError)
            - Logger must be initialized before first use (main.go will call logger.Init())
            - Use zap.NewProduction() for production mode (JSON format, info level)
            - Use zap.NewDevelopment() for development mode (console format, debug level)
            - Logger.Sync() must be called before application shutdown to flush buffers
          files:
            - pkg/logger/logger.go
            - pkg/logger/logger_test.go
            - middleware/middleware.go
            - middleware/middleware_test.go
