pre_mortem:
    overall_risk: low
    rows:
        - scenario: Logger initialization fails in production causing startup failure
          likelihood: low
          impact: high
          mitigation: Agent A tests both production and development mode initialization. Agent B includes error handling for logger.Init() failure with log.Fatalf to fail fast on startup.
        - scenario: Structured logging breaks existing log parsing/monitoring
          likelihood: medium
          impact: low
          mitigation: Zap production mode outputs JSON format which is more parseable than unstructured logs. Document the format change in commit message. JSON format is standard for production logging.
        - scenario: Error sanitization removes too much information making debugging impossible
          likelihood: low
          impact: medium
          mitigation: sanitizeError logs full error details internally before sanitizing. Operators have access to full error context in logs while clients only see generic message.
        - scenario: GIN_MODE not set in deployment causing debug mode in production
          likelihood: low
          impact: medium
          mitigation: Agent B defaults to release mode if GIN_MODE is empty. Dockerfile explicitly sets GIN_MODE=release. Production-safe default prevents accidental debug mode.
