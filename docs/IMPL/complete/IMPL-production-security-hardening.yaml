interface_contracts:
    - name: validateSecretName
      description: Validates secret name to prevent path traversal and ensure format compliance. Called from handlers/secrets.go in GetSecret, CreateSecret, UpdateSecret, DeleteSecret handlers.
      definition: |
        // validateSecretName checks if a secret name is valid and safe to use.
        // Returns error if name is empty, too long, contains path traversal patterns,
        // or includes invalid characters.
        func validateSecretName(name string) error

        Rules:
        - Name length: 1-255 characters
        - Allowed characters: alphanumeric, hyphens, underscores (regex: ^[a-zA-Z0-9_-]+$)
        - Reject: empty strings, "..", "/", "\\"
        - Error messages: descriptive for each failure case
      location: handlers/validation.go
    - name: RateLimitMiddleware
      description: Gin middleware for request rate limiting using token bucket algorithm. Integrated in cmd/server/main.go via r.Use(middleware.RateLimitMiddleware(100)).
      definition: |
        // RateLimitMiddleware creates a Gin middleware that limits requests per second.
        // Uses golang.org/x/time/rate for token bucket rate limiting.
        // Returns HTTP 429 (Too Many Requests) when rate limit is exceeded.
        func RateLimitMiddleware(rps int) gin.HandlerFunc

        Parameters:
        - rps: requests per second (bucket size = rps * 2)

        Response on limit exceeded:
        - Status: 429 Too Many Requests
        - Body: {"error": "rate limit exceeded"}
      location: middleware/ratelimit.go
    - name: SecurityHeaders
      description: Gin middleware for setting security HTTP headers. Integrated in cmd/server/main.go via r.Use(middleware.SecurityHeaders()).
      definition: |
        // SecurityHeaders creates a Gin middleware that sets standard security headers
        // to protect against XSS, clickjacking, MIME sniffing, and protocol downgrade attacks.
        func SecurityHeaders() gin.HandlerFunc

        Headers set:
        - X-Content-Type-Options: nosniff
        - X-Frame-Options: DENY
        - X-XSS-Protection: 1; mode=block
        - Strict-Transport-Security: max-age=31536000; includeSubDomains
        - Content-Security-Policy: default-src 'none'; frame-ancestors 'none'
      location: middleware/security.go
    - name: MockBackend
      description: Test mock implementation of vaultmux.Backend interface for handler testing
      definition: |
        // MockBackend implements vaultmux.Backend interface for testing.
        // Uses in-memory map for secret storage.
        type MockBackend struct {
            items   map[string]string
            listErr error
            getErr  error
            createErr error
            updateErr error
            deleteErr error
        }

        Methods (must match vaultmux.Backend interface):
        - ListItems(ctx context.Context, session vaultmux.Session) ([]*vaultmux.Item, error)
        - GetNotes(ctx context.Context, name string, session vaultmux.Session) (string, error)
        - CreateItem(ctx context.Context, name, value string, session vaultmux.Session) error
        - UpdateItem(ctx context.Context, name, value string, session vaultmux.Session) error
        - DeleteItem(ctx context.Context, name string, session vaultmux.Session) error
        - ItemExists(ctx context.Context, name string, session vaultmux.Session) (bool, error)
        - Init(ctx context.Context) error
        - Authenticate(ctx context.Context) (vaultmux.Session, error)
        - Close() error
      location: handlers/testutil.go
