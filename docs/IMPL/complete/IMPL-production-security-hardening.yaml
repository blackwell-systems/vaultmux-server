            # Agent F - Middleware Integration

            ## What to Implement
            Integrate new security middleware (rate limiting, security headers) into main server setup.

            ## Files to Modify
            - cmd/server/main.go: add middleware to Gin router

            ## Implementation Requirements

            ### cmd/server/main.go
            Add middleware registrations after line 82 (after existing middleware.Logger() and middleware.Recovery()):

            ```go
            r := gin.Default()
            r.Use(middleware.Logger())
            r.Use(middleware.Recovery())

            // ADD THESE LINES:
            r.Use(middleware.SecurityHeaders())         // Apply security headers to all routes
            r.Use(middleware.RateLimitMiddleware(100))  // 100 requests per second global limit
            ```

            Middleware ordering rationale:
            1. Logger (first - logs all requests including rate-limited ones)
            2. Recovery (catch panics)
            3. SecurityHeaders (apply to all responses)
            4. RateLimitMiddleware (reject excessive requests before routing)
            5. Route handlers (execute only if rate limit passed)

            Import additions:
            - No new imports needed (middleware package already imported)

            Configuration:
            - Rate limit: 100 RPS (configurable via environment variable in future, hardcode for now)
            - Apply globally to all routes including /health endpoint

            ## Tests
