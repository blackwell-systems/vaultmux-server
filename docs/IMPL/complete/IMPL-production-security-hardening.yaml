        - id: B
          task: |
            # Agent B - Input Validation & Path Traversal Prevention

            ## What to Implement
            Add comprehensive input validation for secret names to prevent path traversal attacks and ensure format compliance.

            ## Files to Create/Modify
            - handlers/validation.go (new): validation logic
            - handlers/validation_test.go (new): comprehensive validation tests
            - handlers/secrets.go (modify): integrate validation into all handlers

            ## Interface Contract
            ```go
            // handlers/validation.go
            func validateSecretName(name string) error
            ```

            ## Implementation Requirements

            ### handlers/validation.go
            Implement validateSecretName function with these rules:
            1. Length validation: 1-255 characters
            2. Reject empty strings
            3. Reject path traversal patterns: "..", "/", "\\"
            4. Character whitelist: ^[a-zA-Z0-9_-]+$ (alphanumeric, hyphens, underscores only)
            5. Return descriptive errors for each failure case

            ### handlers/validation_test.go
            Table-driven tests covering:
            - Valid names: "my-secret", "secret_123", "MySecret", "a", "a" + strings.Repeat("b", 253)
            - Invalid empty: ""
            - Invalid length: strings.Repeat("a", 256)
            - Invalid path traversal: "../etc/passwd", "../../secret", "foo/../bar", "foo\\bar"
            - Invalid characters: "my secret" (space), "my/secret", "secret@123", "secret#123"
            - Edge cases: "-", "_", "123", "---___123___---"

            ### handlers/secrets.go
            Integrate validation into handlers at lines 56, 100, 127:
            ```go
            name := c.Param("name")
            if err := validateSecretName(name); err != nil {
                c.JSON(http.StatusBadRequest, gin.H{"error": err.Error()})
                return
            }
            ```

            Also validate CreateSecretRequest.Name in CreateSecret handler after ShouldBindJSON.

            ## Tests
            - Run validation_test.go: 100% coverage required
            - Run secrets_test.go: ensure no regressions
            - Manually test with curl: valid names pass, invalid names return 400

            ## Verification Gate
            ```bash
            gofmt -l . && go build -v ./... && go vet ./... && go test -v -race ./handlers
            ```

            ## Constraints
            - Do NOT modify middleware package or cmd/server/main.go
            - Use regexp.MatchString for character validation
            - Error messages must be user-friendly (no stack traces)
            - Validation must execute before any backend calls
          files:
            - handlers/secrets.go
            - handlers/validation.go
            - handlers/validation_test.go
        - id: C
          task: |
            # Agent C - Rate Limiting Middleware

            ## What to Implement
            Create rate limiting middleware using token bucket algorithm to prevent DoS and brute force attacks.

            ## Files to Create
            - middleware/ratelimit.go: rate limiting middleware implementation
            - middleware/ratelimit_test.go: comprehensive middleware tests

            ## Interface Contract
            ```go
            // middleware/ratelimit.go
            func RateLimitMiddleware(rps int) gin.HandlerFunc
            ```

            ## Implementation Requirements

            ### middleware/ratelimit.go
            ```go
            package middleware

            import (
                "net/http"
                "golang.org/x/time/rate"
                "github.com/gin-gonic/gin"
            )

            func RateLimitMiddleware(rps int) gin.HandlerFunc {
                limiter := rate.NewLimiter(rate.Limit(rps), rps*2)
                return func(c *gin.Context) {
                    if !limiter.Allow() {
                        c.JSON(http.StatusTooManyRequests, gin.H{"error": "rate limit exceeded"})
                        c.Abort()
                        return
                    }
                    c.Next()
                }
            }
            ```

            Implementation details:
            - Use golang.org/x/time/rate package (already in dependencies via transitive deps)
            - Token bucket capacity: rps * 2 (allows short bursts)
            - Response: 429 Too Many Requests with JSON error
            - Must call c.Abort() to stop handler chain

            ### middleware/ratelimit_test.go
            Test cases:
            1. Test rate limit not exceeded: send rps-1 requests rapidly, all succeed
            2. Test rate limit exceeded: send rps+10 requests rapidly, verify 429 responses
            3. Test burst handling: verify bucket size allows 2*rps burst
            4. Test recovery: wait for bucket refill, verify requests succeed again
            5. Test multiple concurrent requests: use goroutines to simulate parallel load

            Use httptest.NewRecorder and gin test context for testing.

            ## Tests
            - Run ratelimit_test.go: 100% coverage required
            - Verify middleware correctly blocks excessive requests
            - Test with different rps values (1, 10, 100)

            ## Verification Gate
            ```bash
            gofmt -l . && go build -v ./... && go vet ./... && go test -v -race ./middleware
            ```

            ## Constraints
            - Do NOT modify cmd/server/main.go (integration by Agent F in Wave 2)
            - Do NOT add new dependencies (use existing golang.org/x/time/rate)
            - Rate limiter must be global (not per-IP) for simplicity
            - Must be thread-safe (rate.Limiter is thread-safe by design)
          files:
            - middleware/ratelimit.go
            - middleware/ratelimit_test.go
        - id: D
          task: |
            # Agent D - Security Headers Middleware

            ## What to Implement
            Create middleware that sets standard security HTTP headers to protect against XSS, clickjacking, MIME sniffing, and protocol downgrade attacks.

            ## Files to Create
            - middleware/security.go: security headers middleware
            - middleware/security_test.go: middleware tests

            ## Interface Contract
            ```go
            // middleware/security.go
            func SecurityHeaders() gin.HandlerFunc
            ```

            ## Implementation Requirements

            ### middleware/security.go
            ```go
            package middleware

            import "github.com/gin-gonic/gin"

            func SecurityHeaders() gin.HandlerFunc {
                return func(c *gin.Context) {
                    // Prevent MIME sniffing
                    c.Header("X-Content-Type-Options", "nosniff")

                    // Prevent clickjacking
                    c.Header("X-Frame-Options", "DENY")

                    // XSS protection (legacy browsers)
                    c.Header("X-XSS-Protection", "1; mode=block")

                    // Force HTTPS (when deployed with TLS)
                    c.Header("Strict-Transport-Security", "max-age=31536000; includeSubDomains")

                    // Content Security Policy (API-only, no resources)
                    c.Header("Content-Security-Policy", "default-src 'none'; frame-ancestors 'none'")

                    c.Next()
                }
            }
            ```

            Header explanations (document in godoc):
            - X-Content-Type-Options: prevents browsers from MIME-type sniffing
            - X-Frame-Options: prevents page from being embedded in iframe (clickjacking)
            - X-XSS-Protection: enables browser XSS filter (legacy browser support)
            - Strict-Transport-Security: enforces HTTPS for 1 year (31536000 seconds)
            - Content-Security-Policy: restricts all resource loading (API doesn't serve HTML/JS)

            ### middleware/security_test.go
            Test cases:
            1. Test all headers are set: verify each header exists and has correct value
            2. Test headers don't interfere with JSON responses
            3. Test headers are set before handler execution
            4. Test headers persist through handler chain

            Use gin test mode and httptest.NewRecorder to verify headers.

            ## Tests
            - Run security_test.go: 100% coverage required
            - Verify all 5 headers are set with correct values
            - Test with actual HTTP requests to ensure headers appear in response

            ## Verification Gate
            ```bash
            gofmt -l . && go build -v ./... && go vet ./... && go test -v -race ./middleware
            ```

            ## Constraints
            - Do NOT modify cmd/server/main.go (integration by Agent F in Wave 2)
            - Headers must be set before c.Next() is called
            - CSP must be restrictive (default-src 'none') since this is API-only
            - Do NOT add permissive CORS headers (out of scope)
