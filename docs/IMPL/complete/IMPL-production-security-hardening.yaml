              # Test security headers
              curl -i http://localhost:8080/health
              # Verify headers: X-Content-Type-Options, X-Frame-Options, etc.

              # Test rate limiting (requires rapid requests)
              for i in {1..200}; do curl -s http://localhost:8080/health & done
              # Expect some 429 responses
